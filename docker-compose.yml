version: '3.8'

services:
  # Nginx Webサーバー
  nginx:
    image: nginx:alpine
    container_name: esp32api_nginx
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - esp32api_network

  # PHP-FPM + CodeIgniter4
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esp32api_php
    volumes:
      - ./src:/var/www/html
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - CI_ENVIRONMENT=development
    depends_on:
      - mysql
    networks:
      - esp32api_network

  # MySQL データベース
  mysql:
    image: mysql:8.0
    container_name: esp32api_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: esp32api_db
      MYSQL_USER: esp32user
      MYSQL_PASSWORD: esp32pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - esp32api_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: esp32api_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - esp32api_network

networks:
  esp32api_network:
    driver: bridge

volumes:
  mysql_data:
